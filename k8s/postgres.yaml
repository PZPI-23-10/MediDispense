apiVersion: v1
kind: Secret
metadata:
  name: medidispense-db-secret
type: Opaque
stringData:
  username: postgres
  password: postgres
  database: medidispense
  connectionString: "Host=medidispense-postgres;Port=5432;Database=medidispense;Username=postgres;Password=postgres;Include Error Detail=true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medidispense-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medidispense-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medidispense-postgres
  template:
    metadata:
      labels:
        app: medidispense-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: database
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: medidispense-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: medidispense-postgres
spec:
  type: ClusterIP
  selector:
    app: medidispense-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
