apiVersion: v1
kind: Secret
metadata:
  name: medidispense-api-secret
type: Opaque
stringData:
  accessSecretKey: "local-kubernetes-lab-access-secret-key-please-keep-this-long"
  refreshSecretKey: "local-kubernetes-lab-refresh-secret-key-please-keep-this-long"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medidispense-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medidispense-api
  template:
    metadata:
      labels:
        app: medidispense-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready -h medidispense-postgres -p 5432 -U "$POSTGRES_USER"; do sleep 2; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: password
      containers:
        - name: api
          image: medidispense-api:lab
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Database
              valueFrom:
                secretKeyRef:
                  name: medidispense-db-secret
                  key: connectionString
            - name: JwtSettings__DefaultAccessExpireTimeInMinutes
              value: "60"
            - name: JwtSettings__RememberAccessExpireTimeInDays
              value: "7"
            - name: JwtSettings__RefreshExpireTimeInMinutes
              value: "1500"
            - name: JwtSettings__AccessSecretKey
              valueFrom:
                secretKeyRef:
                  name: medidispense-api-secret
                  key: accessSecretKey
            - name: JwtSettings__RefreshSecretKey
              valueFrom:
                secretKeyRef:
                  name: medidispense-api-secret
                  key: refreshSecretKey
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
